<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <title>Běh – poznámky</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#e63946" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:       #e63946;
      --red-dim:   rgba(230, 57, 70, 0.18);
      --green:     #2a9d8f;
      --green-dim: rgba(42, 157, 143, 0.18);
      --bg:        #0f0f1a;
      --bg2:       #181828;
      --bg3:       #1e1e32;
      --text:      #eaeaea;
      --muted:     #6e7191;
      --border:    rgba(255, 255, 255, 0.07);
      --radius:    14px;
      --radius-sm: 10px;
    }

    body {
      background: radial-gradient(ellipse at 50% 25%, #1e2a4a 0%, #0f0f1a 70%);
      background-attachment: fixed;
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ── Status bar ── */
    #status-bar {
      background: rgba(15, 15, 26, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.72rem;
      text-align: center;
      padding: 7px 16px;
      letter-spacing: 0.03em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    #status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      transition: background 0.4s;
    }

    #status-dot.offline {
      background: var(--red);
    }

    /* ── Hlavní obsah ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px 20px;
    }

    /* ── Indikátor nahrávání ── */
    #recording-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--red);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #recording-indicator .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse 1s infinite;
    }

    #recording-indicator.hidden { visibility: hidden; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── Hlavní tlačítko ── */
    @keyframes record-glow {
      0%, 100% { box-shadow: 0 0 18px 4px rgba(230, 57, 70, 0.45); }
      50%       { box-shadow: 0 0 32px 10px rgba(230, 57, 70, 0.75); }
    }

    #btn-record {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 3px solid var(--red);
      background: var(--red-dim);
      color: var(--red);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.1s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      box-shadow: 0 0 12px 2px rgba(230, 57, 70, 0.2);
    }

    #btn-record:active { transform: scale(0.95); }

    #btn-record.recording {
      background: var(--red);
      color: #fff;
      animation: record-glow 1.2s ease-in-out infinite;
    }

    #btn-record:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      animation: none;
    }

    /* ── Přepis textu ── */
    #transcript {
      width: 100%;
      max-width: 480px;
      min-height: 80px;
      max-height: 40vh;
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 1.05rem;
      line-height: 1.5;
      color: var(--text);
      font-family: inherit;
      border: 1px solid var(--border);
      outline: none;
      resize: none;
      overflow-y: auto;
      field-sizing: content;
      word-break: break-word;
      transition: border-color 0.2s;
    }

    #transcript::placeholder {
      color: var(--muted);
      font-style: italic;
    }

    #transcript:read-only {
      opacity: 0.85;
    }

    #transcript:not(:read-only) {
      border-color: rgba(42, 157, 143, 0.5);
    }

    #transcript:not(:read-only):focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(42, 157, 143, 0.15);
    }

    /* ── Diagnostika STT ── */
    #diagnostics {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      padding: 12px 14px;
    }

    #diagnostics summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #diagnostics summary::marker,
    #diagnostics summary::-webkit-details-marker {
      display: none;
    }

    #diagnostics summary::before {
      content: "▸";
      display: inline-block;
      transition: transform 0.2s;
      color: var(--muted);
    }

    #diagnostics[open] summary::before {
      transform: rotate(90deg);
    }

    #diagnostics[open] #diagnostics-body {
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    #diagnostics-body {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .diag-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.85rem;
      line-height: 1.35;
    }

    .diag-label {
      color: var(--muted);
      flex: 0 0 42%;
    }

    .diag-value {
      color: var(--text);
      text-align: right;
      word-break: break-word;
    }

    /* ── Sekce potvrzení ── */
    #section-confirm {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 480px;
    }

    #section-confirm.hidden { display: none; }

    .btn {
      flex: 1;
      padding: 15px 20px;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #btn-send {
      background: linear-gradient(135deg, #2ab5a5, #1f8a7d);
      color: #fff;
      box-shadow: 0 4px 14px rgba(42, 157, 143, 0.35);
    }

    #btn-send:active {
      box-shadow: 0 2px 8px rgba(42, 157, 143, 0.25);
    }

    #btn-discard {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* ── Zprávy ── */
    #section-error {
      width: 100%;
      max-width: 480px;
      background: rgba(230, 57, 70, 0.1);
      border: 1px solid rgba(230, 57, 70, 0.4);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #ffaaaa;
      line-height: 1.4;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      backdrop-filter: blur(4px);
    }

    #section-error::before {
      content: "⚠";
      flex-shrink: 0;
      font-size: 1rem;
      opacity: 0.8;
    }

    #section-error.hidden { display: none; }

    #section-success {
      width: 100%;
      max-width: 480px;
      background: rgba(42, 157, 143, 0.1);
      border: 1px solid rgba(42, 157, 143, 0.4);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 0.9rem;
      color: #88ffcc;
      text-align: center;
      font-weight: 600;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    #section-success::before {
      content: "✓";
      flex-shrink: 0;
      font-size: 1.1rem;
    }

    #section-success.hidden { display: none; }

    /* ── Footer odkaz na mapu ── */
    footer {
      text-align: center;
      padding: 12px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
      opacity: 0.55;
      transition: opacity 0.2s;
    }

    footer a:hover, footer a:focus {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div id="status-bar">
    <span id="status-dot"></span>
    <span id="status-text">Načítání…</span>
  </div>

  <main>
    <div id="recording-indicator" class="hidden">
      <span class="dot"></span> Nahrávám
    </div>

    <button id="btn-record">MLUVIT</button>

    <textarea id="transcript" placeholder="Přepis se zobrazí zde…" readonly rows="2"></textarea>

    <details id="diagnostics">
      <summary>Diagnostika STT</summary>
      <div id="diagnostics-body">
        <div class="diag-row">
          <div class="diag-label">Engine</div>
          <div class="diag-value" id="diag-engine">zjišťuji…</div>
        </div>
        <div class="diag-row">
          <div class="diag-label">Model</div>
          <div class="diag-value" id="diag-model">zjišťuji…</div>
        </div>
        <div class="diag-row">
          <div class="diag-label">Stav</div>
          <div class="diag-value" id="diag-status">zjišťuji…</div>
        </div>
        <div class="diag-row">
          <div class="diag-label">Aktivní režim</div>
          <div class="diag-value" id="diag-mode">zjišťuji…</div>
        </div>
        <div class="diag-row">
          <div class="diag-label">Info</div>
          <div class="diag-value" id="diag-hint">Počkej na inicializaci.</div>
        </div>
      </div>
    </details>

    <div id="section-confirm" class="hidden">
      <button class="btn" id="btn-send">Odeslat</button>
      <button class="btn" id="btn-discard">Zrušit</button>
    </div>

    <div id="section-error" class="hidden"></div>
    <div id="section-success" class="hidden"></div>
  </main>

  <footer>
    <a href="./index.html">Zobrazit mapu</a>
  </footer>

  <script>
    window.RUN_NOTES_CONFIG = window.RUN_NOTES_CONFIG || {};
  </script>
  <script src="./runtime-config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
