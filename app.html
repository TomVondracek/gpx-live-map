<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <title>Běh – poznámky</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#e63946" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="./manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #e63946;
      --green:  #2a9d8f;
      --bg:     #1a1a2e;
      --bg2:    #16213e;
      --text:   #eaeaea;
      --muted:  #888;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ── Status bar ── */
    #status-bar {
      background: var(--bg2);
      color: var(--muted);
      font-size: 0.75rem;
      text-align: center;
      padding: 6px 16px;
      letter-spacing: 0.03em;
    }

    /* ── Hlavní obsah ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px 20px;
    }

    /* ── Indikátor nahrávání ── */
    #recording-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--red);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #recording-indicator .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse 1s infinite;
    }

    #recording-indicator.hidden { visibility: hidden; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── Hlavní tlačítko ── */
    #btn-record {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 4px solid var(--red);
      background: transparent;
      color: var(--red);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #btn-record:active { transform: scale(0.95); }

    #btn-record.recording {
      background: var(--red);
      color: #fff;
    }

    #btn-record:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Přepis textu ── */
    #transcript-box {
      width: 100%;
      max-width: 480px;
      min-height: 80px;
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 1.05rem;
      line-height: 1.5;
      color: var(--text);
    }

    #transcript {
      white-space: pre-wrap;
      word-break: break-word;
    }

    #transcript:empty::before {
      content: "Přepis se zobrazí zde…";
      color: var(--muted);
      font-style: italic;
    }

    /* ── Sekce potvrzení ── */
    #section-confirm {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 480px;
    }

    #section-confirm.hidden { display: none; }

    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #btn-send {
      background: var(--green);
      color: #fff;
    }

    #btn-discard {
      background: var(--bg2);
      color: var(--muted);
    }

    /* ── Zprávy ── */
    #section-error {
      width: 100%;
      max-width: 480px;
      background: #3d0a0a;
      border: 1px solid var(--red);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #ffaaaa;
      line-height: 1.4;
    }

    #section-error.hidden { display: none; }

    #section-success {
      width: 100%;
      max-width: 480px;
      background: #0a2e1a;
      border: 1px solid var(--green);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 0.9rem;
      color: #88ffcc;
      text-align: center;
      font-weight: 600;
    }

    #section-success.hidden { display: none; }

    /* ── Footer odkaz na mapu ── */
    footer {
      text-align: center;
      padding: 12px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    footer a {
      color: var(--muted);
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div id="status-bar">Načítání…</div>

  <main>
    <div id="recording-indicator" class="hidden">
      <span class="dot"></span> Nahrávám
    </div>

    <button id="btn-record">MLUVIT</button>

    <div id="transcript-box">
      <div id="transcript"></div>
    </div>

    <div id="section-confirm" class="hidden">
      <button class="btn" id="btn-send">Odeslat</button>
      <button class="btn" id="btn-discard">Zrušit</button>
    </div>

    <div id="section-error" class="hidden"></div>
    <div id="section-success" class="hidden"></div>
  </main>

  <footer>
    <a href="./index.html">Zobrazit mapu</a>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
