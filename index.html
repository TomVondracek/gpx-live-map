<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Live běh mapa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
  <style>
    body { margin:0; }
    #map { height:100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbxZli-8aEpEKd6rV8pzFsC73EDI3h-dNIOmBBj4T967HKWxaL-a431b6C21QBOJpEWr/exec";
const GPX_URL = "./trasa.gpx";

const map = L.map('map').setView([49.8, 18.27], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

let markers = [];
let firstFitDone = false;

let gpxLayer = new L.GPX(GPX_URL, {
  async: true,
  marker_options: {
    startIconUrl: null,
    endIconUrl: null,
    shadowUrl: null
  }
}).on("loaded", function(e) {
  const bounds = e.target.getBounds();
  if (bounds.isValid()) {
    map.fitBounds(bounds.pad(0.1));
    firstFitDone = true;
  }
}).addTo(map);

const redIcon = L.icon({
  iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png",
  shadowUrl: "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png",
  iconSize: [25, 41],
  iconAnchor: [12, 41],
  popupAnchor: [1, -34],
  shadowSize: [41, 41]
});

function formatTime(raw) {
  if (!raw) return "";
  const d = new Date(raw);
  if (isNaN(d.getTime())) return raw;
  return d.toLocaleString("cs-CZ", {
    timeZone: "Europe/Prague",
    day: "numeric",
    month: "numeric",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

async function loadData() {
  const res = await fetch(SHEET_URL, { cache: "no-store" });
  const data = await res.json();

  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const validPoints = data.filter(point =>
    point &&
    point.lat !== null &&
    point.lon !== null &&
    point.lat !== "" &&
    point.lon !== "" &&
    !Number.isNaN(Number(point.lat)) &&
    !Number.isNaN(Number(point.lon))
  );

  validPoints.forEach((point, index) => {
    const isLast = index === validPoints.length - 1;
    const lat = Number(point.lat);
    const lon = Number(point.lon);

    const marker = L.marker([lat, lon], isLast ? { icon: redIcon } : {}).addTo(map);

    marker.bindPopup(`
      <b>${formatTime(point.time)}</b><br/>
      ${point.note ?? ""}
      ${point.battery !== null && point.battery !== undefined ? `<br/><small style="color:#888">&#128267; ${point.battery}%</small>` : ""}
    `);

    if (isLast) marker.openPopup();

    markers.push(marker);
  });

  if (validPoints.length > 0 && !firstFitDone) {
    const bounds = L.latLngBounds(validPoints.map(p => [Number(p.lat), Number(p.lon)]));
    if (bounds.isValid()) {
      map.fitBounds(bounds.pad(0.2));
      firstFitDone = true;
    }
  }
}

loadData();
setInterval(loadData, 10000);
</script>

</body>
</html>
