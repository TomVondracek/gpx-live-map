<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <title>Live běh mapa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./vendor/leaflet/leaflet.css" />
  <script src="./vendor/leaflet/leaflet.js"></script>
  <script src="./vendor/leaflet-gpx/gpx.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:       #e63946;
      --red-dim:   rgba(230, 57, 70, 0.15);
      --green:     #2a9d8f;
      --green-dim: rgba(42, 157, 143, 0.15);
      --bg:        #0f0f1a;
      --bg2:       #181828;
      --bg3:       #1e1e32;
      --text:      #eaeaea;
      --muted:     #6e7191;
      --border:    rgba(255, 255, 255, 0.07);
      --radius:    12px;
      --panel-w:   320px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: row;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* ── Mapa ── */
    #map {
      flex: 1;
      height: 100vh;
      transition: width 0.3s;
      z-index: 1;
    }

    #map-back {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 16px;
      z-index: 100;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 10px 18px;
      background: rgba(15, 15, 26, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, transform 0.1s;
    }

    #map-back:active {
      transform: scale(0.97);
    }

    /* ── Panel zpráv – desktop ── */
    #notes-panel {
      width: var(--panel-w);
      height: 100vh;
      background: rgba(15, 15, 26, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 10;
      overflow: hidden;
    }

    /* ── Záhlaví panelu ── */
    #notes-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #notes-title {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #notes-count {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--green);
      background: var(--green-dim);
      border-radius: 20px;
      padding: 2px 9px;
      min-width: 24px;
      text-align: center;
    }

    /* Tlačítko zavřít – jen na mobilu */
    #notes-close {
      display: none;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 2px 6px;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Seznam zpráv ── */
    #notes-list {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 8px 0;
    }

    #notes-list::-webkit-scrollbar {
      width: 4px;
    }
    #notes-list::-webkit-scrollbar-track {
      background: transparent;
    }
    #notes-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* ── Jednotlivá zpráva ── */
    .note-item {
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      border-left: 3px solid transparent;
      position: relative;
    }

    .note-item:last-child {
      border-bottom: none;
    }

    .note-item:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .note-item.active {
      background: var(--green-dim);
      border-left-color: var(--green);
    }

    .note-item.no-gps {
      cursor: default;
      opacity: 0.55;
    }

    .note-time {
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 4px;
      letter-spacing: 0.02em;
    }

    .note-text {
      font-size: 0.9rem;
      line-height: 1.45;
      color: var(--text);
      word-break: break-word;
    }

    .note-text.empty {
      color: var(--muted);
      font-style: italic;
    }

    .note-text.audio {
      color: #f6d98f;
      font-weight: 600;
    }

    .note-audio-row {
      margin-top: 8px;
    }

    .note-audio-button {
      border: 1px solid var(--border);
      background: rgba(233, 196, 106, 0.12);
      color: #f6d98f;
      border-radius: 999px;
      padding: 7px 12px;
      font: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .note-audio-button:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .popup-audio {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 220px;
    }

    .popup-audio .note-audio-button {
      background: #0f0f1a;
      color: #f6d98f;
      border: 1px solid #0f0f1a;
    }

    .popup-audio audio {
      width: 100%;
    }

    /* ── Stav "žádné zprávy" ── */
    #notes-empty {
      display: none;
      padding: 32px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.6;
    }

    /* ── Plovoucí tlačítko – jen mobil ── */
    #notes-fab {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 16px;
      z-index: 100;
      background: rgba(15, 15, 26, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 10px 18px;
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transition: background 0.15s, transform 0.1s;
    }

    #notes-fab:active {
      transform: scale(0.96);
    }

    #fab-count {
      display: inline-block;
      background: var(--green);
      color: #fff;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 1px 7px;
      margin-left: 6px;
      min-width: 20px;
      text-align: center;
    }

    /* ── Mobilní breakpoint ── */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
        overflow: hidden;
      }

      #map {
        width: 100vw;
        height: 100vh;
        flex: none;
      }

      #notes-fab {
        display: flex;
        align-items: center;
      }

      #map-back {
        display: inline-flex;
        align-items: center;
      }

      #notes-panel {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        height: 52vh;
        border-left: none;
        border-top: 1px solid var(--border);
        border-radius: 16px 16px 0 0;
        transform: translateY(100%);
        transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 200;
      }

      #notes-panel.open {
        transform: translateY(0);
      }

      #notes-close {
        display: block;
      }
    }
  </style>
</head>
<body>

<div id="map"></div>
<button id="map-back" type="button" aria-label="Vrátit se na hlavní obrazovku" onclick="window.history.length > 1 ? window.history.back() : (window.location.href = './index.html')">← Zpět</button>

<!-- Panel zpráv -->
<div id="notes-panel">
  <div id="notes-header">
    <span id="notes-title">Zprávy</span>
    <span id="notes-count">0</span>
    <button id="notes-close" aria-label="Zavřít panel">×</button>
  </div>
  <div id="notes-list">
    <div id="notes-empty">Zatím žádné zprávy.<br/>Záznamy se načtou automaticky.</div>
  </div>
</div>

<!-- Plovoucí tlačítko (mobil) -->
<button id="notes-fab">
  ☰ Zprávy<span id="fab-count">0</span>
</button>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbxZli-8aEpEKd6rV8pzFsC73EDI3h-dNIOmBBj4T967HKWxaL-a431b6C21QBOJpEWr/exec";
const GPX_URL = "./trasa.gpx";
const MAP_TOKEN_STORAGE_KEY = "beh-poznamky-map-token";

const map = L.map('map').setView([49.8, 18.27], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

let markers = [];
let markerByPointKey = new Map();
let firstFitDone = false;
let gpxPoints = []; // for route matching
let activePointKey = null;
let hasShownInitialLatestPopup = false;
let isRefreshingMarkers = false;

function readTokenFromLocation() {
  const queryToken = new URLSearchParams(window.location.search).get("token");
  const rawHash = window.location.hash.startsWith("#") ? window.location.hash.slice(1) : window.location.hash;
  const hashToken = new URLSearchParams(rawHash).get("token");
  return hashToken || queryToken || "";
}

function storeMapToken(token) {
  if (!token) return;
  try {
    localStorage.setItem(MAP_TOKEN_STORAGE_KEY, token);
  } catch {
    // localStorage nemusí být dostupné
  }
}

function readStoredMapToken() {
  try {
    return localStorage.getItem(MAP_TOKEN_STORAGE_KEY) || "";
  } catch {
    return "";
  }
}

function clearTokenFromUrl() {
  const url = new URL(window.location.href);
  let changed = false;

  if (url.searchParams.has("token")) {
    url.searchParams.delete("token");
    changed = true;
  }

  const rawHash = url.hash.startsWith("#") ? url.hash.slice(1) : url.hash;
  if (rawHash) {
    const hashParams = new URLSearchParams(rawHash);
    if (hashParams.has("token")) {
      hashParams.delete("token");
      url.hash = hashParams.toString() ? `#${hashParams.toString()}` : "";
      changed = true;
    }
  }

  if (changed) {
    window.history.replaceState({}, document.title, url.toString());
  }
}

function getMapToken() {
  const urlToken = readTokenFromLocation();
  if (urlToken) {
    storeMapToken(urlToken);
    clearTokenFromUrl();
    return urlToken;
  }
  return readStoredMapToken();
}

function getSheetDataUrl() {
  const token = getMapToken();
  if (!token) return null;

  const url = new URL(SHEET_URL);
  url.searchParams.set("token", token);
  return url.toString();
}

function setNotesStatus(message) {
  const empty = document.getElementById("notes-empty");
  const countBadge = document.getElementById("notes-count");
  const fabCount = document.getElementById("fab-count");
  const list = document.getElementById("notes-list");

  empty.innerHTML = "";
  empty.textContent = message;
  empty.style.display = "block";
  countBadge.textContent = "0";
  fabCount.textContent = "0";
  Array.from(list.querySelectorAll(".note-item")).forEach(el => el.remove());
}

// ── Počasí a nástroje ───────────────────────────────────────────────────────
const WEATHER_ICONS = {
  0: "☀️",
  1: "🌤️", 2: "⛅", 3: "🌥️",
  45: "🌫️", 48: "🌫️",
  51: "🌧️", 53: "🌧️", 55: "🌧️", 56: "🌧️", 57: "🌧️", 61: "🌧️", 63: "🌧️", 65: "🌧️", 66: "🌧️", 67: "🌧️",
  71: "🌨️", 73: "🌨️", 75: "🌨️", 77: "🌨️",
  80: "🌦️", 81: "🌦️", 82: "🌦️",
  95: "⛈️", 96: "⛈️", 99: "⛈️"
};

function getWeatherEmoji(code) {
  if (code == null) return "";
  return WEATHER_ICONS[code] || "🌤️";
}

function getDistanceFromLatLonInMeters(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

function findRouteKm(lat, lon) {
  if (gpxPoints.length === 0) return null;
  let minDist = Infinity;
  let bestKm = null;
  for (let i = 0; i < gpxPoints.length; i++) {
    const pt = gpxPoints[i];
    const dist = getDistanceFromLatLonInMeters(lat, lon, pt.lat, pt.lon);
    if (dist < minDist) {
      minDist = dist;
      bestKm = pt.km;
    }
  }
  if (minDist <= 100) {
    return Math.round(bestKm * 10) / 10;
  }
  return null;
}

// ── GPX trasa ──────────────────────────────────────────────────────────────
let gpxLayer = new L.GPX(GPX_URL, {
  async: true,
  marker_options: {
    startIconUrl: null,
    endIconUrl: null,
    shadowUrl: null
  }
}).on("loaded", function(e) {
  const bounds = e.target.getBounds();
  if (bounds.isValid()) {
    map.fitBounds(bounds.pad(0.1));
    firstFitDone = true;
  }

  const layers = e.target.getLayers();
  let cumulativeDist = 0;
  let lastPt = null;

  layers.forEach(layer => {
    if (layer instanceof L.Polyline) {
      const latlngs = layer.getLatLngs();
      const flatten = (arr) => {
        if (arr.length > 0 && Array.isArray(arr[0])) {
          arr.forEach(flatten);
        } else if (arr.length > 0) {
          arr.forEach(ll => {
            if (lastPt) {
              cumulativeDist += getDistanceFromLatLonInMeters(lastPt.lat, lastPt.lng, ll.lat, ll.lng);
            }
            gpxPoints.push({ lat: ll.lat, lon: ll.lng, km: cumulativeDist / 1000 });
            lastPt = ll;
          });
        }
      };
      flatten(latlngs);
    }
  });

  if (markers.length > 0) {
    loadData();
  }
}).addTo(map);

// ── Ikona červeného markeru ─────────────────────────────────────────────────
const redIcon = L.icon({
  iconUrl: "./vendor/leaflet-color-markers/marker-icon-2x-red.png",
  shadowUrl: "./vendor/leaflet/images/marker-shadow.png",
  iconSize: [25, 41],
  iconAnchor: [12, 41],
  popupAnchor: [1, -34],
  shadowSize: [41, 41]
});

const audioBlobUrlCache = new Map();
const audioFetchPromises = new Map();

// ── Formátování času ────────────────────────────────────────────────────────
function formatTime(raw) {
  if (!raw) return "";
  const d = new Date(raw);
  if (isNaN(d.getTime())) return raw;
  return d.toLocaleString("cs-CZ", {
    timeZone: "Europe/Prague",
    day: "numeric",
    month: "numeric",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function formatTimeShort(raw) {
  if (!raw) return "";
  const d = new Date(raw);
  if (isNaN(d.getTime())) return raw;
  return d.toLocaleString("cs-CZ", {
    timeZone: "Europe/Prague",
    day: "numeric",
    month: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function formatAudioDuration(durationSec) {
  const totalSeconds = Math.max(1, Math.round(Number(durationSec) || 0));
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  if (minutes === 0) return `${seconds} s`;
  return `${minutes}:${String(seconds).padStart(2, "0")} min`;
}

function getEntryType(point) {
  if (point.entry_type === "audio" || point.audio_file_id) return "audio";
  if (point.entry_type === "photo" || point.photo_file_id) return "photo";
  return "text";
}

function getPointKey(point) {
  return [
    point.time ?? "",
    point.lat ?? "",
    point.lon ?? "",
    point.note ?? "",
    point.entry_type ?? "",
    point.audio_file_id ?? "",
    point.photo_file_id ?? ""
  ].join("|");
}

function syncActiveNoteUI() {
  document.querySelectorAll(".note-item").forEach((el) => {
    el.classList.toggle("active", el.dataset.pointKey === activePointKey);
  });
}

function base64ToBlobUrl(base64, mimeType) {
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) {
    bytes[i] = binary.charCodeAt(i);
  }
  return URL.createObjectURL(new Blob([bytes], { type: mimeType || "audio/webm" }));
}

function getAudioDataUrl(fileId) {
  const token = getMapToken();
  if (!token || !fileId) return null;

  const url = new URL(SHEET_URL);
  url.searchParams.set("token", token);
  url.searchParams.set("audioFileId", fileId);
  return url.toString();
}

async function fetchAudioBlobUrl(fileId) {
  if (audioBlobUrlCache.has(fileId)) {
    return audioBlobUrlCache.get(fileId);
  }

  if (audioFetchPromises.has(fileId)) {
    return audioFetchPromises.get(fileId);
  }

  const promise = (async () => {
    const url = getAudioDataUrl(fileId);
    if (!url) {
      throw new Error("missing_audio_token");
    }

    const res = await fetch(url, { cache: "no-store" });
    const data = await res.json();
    if (!res.ok || !data || data.ok === false || !data.audioBase64) {
      throw new Error(data && data.error ? data.error : "audio_unavailable");
    }

    const blobUrl = base64ToBlobUrl(data.audioBase64, data.mimeType);
    audioBlobUrlCache.set(fileId, blobUrl);
    return blobUrl;
  })().finally(() => {
    audioFetchPromises.delete(fileId);
  });

  audioFetchPromises.set(fileId, promise);
  return promise;
}

function createAudioPlayControl(point, options = {}) {
  const container = document.createElement("div");
  container.className = options.compact ? "note-audio-row" : "popup-audio";

  const button = document.createElement("button");
  button.type = "button";
  button.className = "note-audio-button";
  button.textContent = point.audio_duration_sec
    ? `▶ Přehrát (${formatAudioDuration(point.audio_duration_sec)})`
    : "▶ Přehrát";

  const audio = document.createElement("audio");
  audio.controls = true;
  audio.preload = "none";
  audio.style.display = "none";

  if (!point.audio_file_id) {
    button.disabled = true;
    button.textContent = "Audio chybí";
  } else {
    button.addEventListener("click", async (event) => {
      event.preventDefault();
      event.stopPropagation();
      button.disabled = true;
      const originalLabel = button.textContent;
      button.textContent = "Načítám…";

      try {
        const blobUrl = await fetchAudioBlobUrl(point.audio_file_id);
        audio.src = blobUrl;
        audio.style.display = "block";
        button.textContent = "▶ Přehrát znovu";
        await audio.play().catch(() => {});
      } catch (error) {
        console.error("Načtení audia selhalo:", error);
        button.textContent = "▶ Nelze přehrát";
      } finally {
        button.disabled = false;
        if (button.textContent === "Načítám…") {
          button.textContent = originalLabel;
        }
      }
    });
  }

  container.appendChild(button);
  container.appendChild(audio);
  return container;
}

function buildPopupContent(point, weatherLine, metaParts) {
  const wrapper = document.createElement("div");
  const title = document.createElement("b");
  title.textContent = formatTime(point.time);
  wrapper.appendChild(title);

  if (weatherLine) {
    const weather = document.createElement("span");
    weather.textContent = ` · ${weatherLine}`;
    wrapper.appendChild(weather);
  }

  wrapper.appendChild(document.createElement("br"));

  const entryType = getEntryType(point);

  if (entryType === "audio") {
    wrapper.appendChild(createAudioPlayControl(point));
  } else if (entryType === "photo") {
    const img = document.createElement("img");
    img.src = `https://drive.google.com/uc?id=${point.photo_file_id}`;
    img.style.width = "100%";
    img.style.maxWidth = "240px";
    img.style.borderRadius = "8px";
    img.style.marginTop = "8px";
    img.style.objectFit = "contain";
    
    // Zobrazení plné velikosti po kliknutí
    img.style.cursor = "pointer";
    img.onclick = () => window.open(img.src, "_blank");

    wrapper.appendChild(img);
  } else {
    const note = document.createElement("div");
    note.textContent = point.note ?? "";
    wrapper.appendChild(note);
  }

  if (metaParts.length > 0) {
    wrapper.appendChild(document.createElement("br"));
    const meta = document.createElement("small");
    meta.style.color = "#888";
    meta.textContent = metaParts.join(" · ");
    wrapper.appendChild(meta);
  }

  return wrapper;
}

// ── Panel zpráv ─────────────────────────────────────────────────────────────

// Detekce, zda uživatel scrolloval ručně (pak nepřeskakujeme na nové zprávy)
let userScrolled = false;
const notesList = document.getElementById("notes-list");
notesList.addEventListener("scroll", () => {
  // Pokud je scrolován dolů od vrchu, uživatel roluje ručně
  userScrolled = notesList.scrollTop > 40;
}, { passive: true });

function renderNotesList(validPoints) {
  const list = document.getElementById("notes-list");
  const empty = document.getElementById("notes-empty");
  const countBadge = document.getElementById("notes-count");
  const fabCount = document.getElementById("fab-count");

  // Seřadit od nejnovějšího
  // validPoints jsou v pořadí ze Sheets (starší → novější), otočíme pro zobrazení
  const reversed = [...validPoints].reverse();

  countBadge.textContent = reversed.length;
  fabCount.textContent = reversed.length;

  if (reversed.length === 0) {
    empty.style.display = "block";
    // Smazat stávající items
    Array.from(list.querySelectorAll(".note-item")).forEach(el => el.remove());
    return;
  }

  empty.style.display = "none";

  // Porovnej stávající počet – pokud je stejný, jen aktualizuj active stav
  // Pro jednoduchost vždy překreslit (data se mění max každých 10s)
  Array.from(list.querySelectorAll(".note-item")).forEach(el => el.remove());

  reversed.forEach((point, reversedIndex) => {
    const hasGps = point.lat !== null && point.lat !== "" && point.lon !== null && point.lon !== "";
    const pointKey = getPointKey(point);
    const entryType = getEntryType(point);

    const item = document.createElement("div");
    item.className = "note-item" + (hasGps ? "" : " no-gps");
    item.dataset.pointKey = pointKey;
    if (activePointKey === pointKey) item.classList.add("active");

    const timeEl = document.createElement("div");
    timeEl.className = "note-time";
    timeEl.textContent = formatTimeShort(point.time) || "—";

    const textEl = document.createElement("div");
    const noteText = (point.note ?? "").trim();
    if (entryType === "audio") {
      textEl.className = "note-text audio";
      textEl.textContent = "▶ Hlasová poznámka";
    } else if (entryType === "photo") {
      textEl.className = "note-text photo";
      textEl.textContent = "📷 Fotografie";
    } else {
      textEl.className = "note-text" + (noteText ? "" : " empty");
      textEl.textContent = noteText || "bez textu";
    }

    item.appendChild(timeEl);
    item.appendChild(textEl);

    if (entryType === "audio") {
      item.appendChild(createAudioPlayControl(point, { compact: true }));
    } else if (entryType === "photo") {
      const img = document.createElement("img");
      img.src = `https://drive.google.com/uc?id=${point.photo_file_id}`;
      img.style.width = "100%";
      img.style.maxHeight = "120px";
      img.style.objectFit = "cover";
      img.style.borderRadius = "6px";
      img.style.marginTop = "6px";
      item.appendChild(img);
    }

    // Meta info (speed, alt, weather, km)
    const metaParts = [];
    if (point.weather_code != null) {
      const emoji = getWeatherEmoji(point.weather_code);
      const temp = point.weather_temp != null ? ` ${Math.round(point.weather_temp)}°C` : "";
      metaParts.push(`${emoji}${temp}`);
    }
    if (entryType === "audio" && point.audio_duration_sec != null) {
      metaParts.push(`🎙 ${formatAudioDuration(point.audio_duration_sec)}`);
    }
    if (point.speed != null) metaParts.push(`⚡ ${point.speed} km/h`);
    if (point.altitude != null) metaParts.push(`▲ ${point.altitude} m`);
    
    // Zjisti km na trase pokud máme gps
    if (hasGps && gpxPoints.length > 0) {
      const routeKm = findRouteKm(Number(point.lat), Number(point.lon));
      if (routeKm != null) {
        metaParts.push(`📍 km ${routeKm}`);
      }
      point._routeKm = routeKm; // ulož pro popup
    }

    if (metaParts.length > 0) {
      const metaEl = document.createElement("div");
      metaEl.className = "note-meta";
      metaEl.style.fontSize = "0.75rem";
      metaEl.style.color = "var(--muted)";
      metaEl.style.marginTop = "6px";
      metaEl.textContent = metaParts.join("  ·  ");
      item.appendChild(metaEl);
    }

    if (hasGps) {
      item.addEventListener("click", () => {
        const lat = Number(point.lat);
        const lon = Number(point.lon);
        activePointKey = pointKey;
        syncActiveNoteUI();

        // Vycentruj mapu a otevři popup
        map.setView([lat, lon], 15, { animate: true });
        const marker = markerByPointKey.get(pointKey);
        if (marker) {
          marker.openPopup();
        }

        // Na mobilu zavři panel po kliknutí
        if (window.innerWidth <= 768) {
          closeMobilePanel();
        }
      });
    }

    list.appendChild(item);
  });

  // Auto-scroll na vrch (nejnovější zpráva) jen pokud uživatel neroluje ručně
  if (!userScrolled) {
    list.scrollTop = 0;
  }
}

// ── Mobilní panel – otevření/zavření ────────────────────────────────────────
const panel = document.getElementById("notes-panel");
const fab = document.getElementById("notes-fab");
const closeBtn = document.getElementById("notes-close");
const backBtn = document.getElementById("map-back");

function getMainScreenUrl() {
  const path = window.location.pathname || "";
  return path.endsWith("/map.html") || path.endsWith("\\map.html")
    ? "./index.html"
    : "./app.html";
}

function goBackToMainScreen() {
  const sameOriginReferrer = document.referrer && document.referrer.startsWith(window.location.origin);
  if (sameOriginReferrer && window.history.length > 1) {
    window.history.back();
    return;
  }
  window.location.href = getMainScreenUrl();
}

function openMobilePanel() {
  panel.classList.add("open");
  userScrolled = false;
}

function closeMobilePanel() {
  panel.classList.remove("open");
}

function toggleMobilePanel() {
  if (panel.classList.contains("open")) {
    closeMobilePanel();
  } else {
    openMobilePanel();
  }
}

fab.addEventListener("click", toggleMobilePanel);
closeBtn.addEventListener("click", closeMobilePanel);
backBtn.addEventListener("click", goBackToMainScreen);

// Klik na mapu zavře mobilní panel
map.on("click", () => {
  if (window.innerWidth <= 768) {
    closeMobilePanel();
  }
});

// ── Načítání dat ─────────────────────────────────────────────────────────────
async function loadData() {
  // Pokud aktuálně hraje nějaké audio, přeskočíme aktualizaci mapy, aby se nepřerušilo přehrávání.
  const isAudioPlaying = Array.from(document.querySelectorAll("audio")).some(audio => !audio.paused && !audio.ended);
  if (isAudioPlaying) {
    return;
  }

  isRefreshingMarkers = true;
  try {
    const dataUrl = getSheetDataUrl();
    if (!dataUrl) {
      setNotesStatus("Chybí přístupový token. Otevři mapu s #token=... v URL.");
      return;
    }

    const res = await fetch(dataUrl, { cache: "no-store" });
    const data = await res.json();
    if (!Array.isArray(data)) {
      throw new Error(data && data.error ? data.error : "Neplatná odpověď serveru.");
    }

    markers.forEach(m => map.removeLayer(m));
    markers = [];
    markerByPointKey = new Map();

    const validPoints = data.filter(point =>
      point &&
      point.lat !== null &&
      point.lon !== null &&
      point.lat !== "" &&
      point.lon !== "" &&
      !Number.isNaN(Number(point.lat)) &&
      !Number.isNaN(Number(point.lon))
    );

    validPoints.forEach((point, index) => {
      const isLast = index === validPoints.length - 1;
      const lat = Number(point.lat);
      const lon = Number(point.lon);
      const pointKey = getPointKey(point);

      const marker = L.marker([lat, lon], isLast ? { icon: redIcon } : {}).addTo(map);

      const metaParts = [];
      if (getEntryType(point) === "audio" && point.audio_duration_sec != null) {
        metaParts.push(`🎙 ${formatAudioDuration(point.audio_duration_sec)}`);
      }
      if (point.battery != null) metaParts.push(`🔋 ${point.battery}%`);
      if (point.speed != null) metaParts.push(`⚡ ${point.speed} km/h`);
      if (point.altitude != null) metaParts.push(`▲ ${point.altitude} m`);
      
      // Upozornění: gpxPoints.length už může být naplněno, 
      // my ale renderNotesList voláme až *po* tomhle bloku, proto raději
      // najdeme routeKm znovu tady nebo sjednotíme s polem.
      const routeKm = findRouteKm(lat, lon);
      if (routeKm != null) metaParts.push(`📍 km ${routeKm}`);

      let weatherLine = "";
      if (point.weather_code != null) {
        const emoji = getWeatherEmoji(point.weather_code);
        const temp = point.weather_temp != null ? ` ${Math.round(point.weather_temp)}°C` : "";
        weatherLine = `${emoji}${temp}`;
      }

      marker.bindPopup(buildPopupContent(point, weatherLine, metaParts));
      marker._pointKey = pointKey;
      markerByPointKey.set(pointKey, marker);
      marker.on("popupopen", () => {
        activePointKey = pointKey;
        syncActiveNoteUI();
      });
      marker.on("popupclose", () => {
        if (!isRefreshingMarkers && activePointKey === pointKey) {
          activePointKey = null;
          syncActiveNoteUI();
        }
      });

      markers.push(marker);
    });

    if (validPoints.length > 0 && !firstFitDone) {
      const bounds = L.latLngBounds(validPoints.map(p => [Number(p.lat), Number(p.lon)]));
      if (bounds.isValid()) {
        map.fitBounds(bounds.pad(0.2));
        firstFitDone = true;
      }
    }

    if (!hasShownInitialLatestPopup && validPoints.length > 0) {
      activePointKey = getPointKey(validPoints[validPoints.length - 1]);
      hasShownInitialLatestPopup = true;
    }

    if (activePointKey) {
      const activeMarker = markerByPointKey.get(activePointKey);
      if (activeMarker) {
        activeMarker.openPopup();
      }
    }

    // Aktualizuj seznam zpráv (všechny body, ne jen ty s GPS)
    const allPoints = data.filter(p => p != null);
    renderNotesList(allPoints);
  } catch (error) {
    console.error("Načtení mapových dat selhalo:", error);
    setNotesStatus("Nepodařilo se načíst poznámky. Zkontroluj přístupový token.");
  } finally {
    isRefreshingMarkers = false;
  }
}

loadData();
setInterval(loadData, 10000);
</script>
