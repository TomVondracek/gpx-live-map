<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <title>UltraLog – mapa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon – stejný design jako ikona aplikace -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='t' x1='0%25' y1='100%25' x2='100%25' y2='0%25'%3E%3Cstop offset='0%25' stop-color='%233b82f6'/%3E%3Cstop offset='100%25' stop-color='%2386efac'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='%230f0f1a'/%3E%3Cpath d='M15 46 C18 42 21 39 24 37 C28 34 31 32 35 29 C39 27 42 24 45 22 C47 20 48 19 49 16' fill='none' stroke='url(%23t)' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='24' cy='37' r='2.5' fill='%2322d3ee'/%3E%3Ccircle cx='35' cy='29' r='2.5' fill='%2322d3ee'/%3E%3Ccircle cx='49' cy='16' r='3.5' fill='%2386efac'/%3E%3Ccircle cx='49' cy='16' r='1.5' fill='%230f0f1a'/%3E%3Cpath d='M16 51 Q18 49 20 51 Q22 53 24 51 Q26 49 28 51 Q30 53 32 51 Q34 49 36 51 Q38 53 40 51 Q42 49 44 51 Q46 52 48 51' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' opacity='0.6'/%3E%3C/svg%3E">

  <link rel="stylesheet" href="./vendor/leaflet/leaflet.css" />
  <script src="./vendor/leaflet/leaflet.js"></script>
  <script src="./vendor/leaflet-gpx/gpx.min.js"></script>

  <link rel="stylesheet" href="./map/map.css" />
</head>
<body>

<div id="map"></div>
<button id="map-back" type="button" aria-label="Vrátit se na hlavní obrazovku">← Zpět</button>
<a id="map-download-gpx" href="./trasa.gpx" download="trasa.gpx" aria-label="Stáhnout GPX trasu">↓ Stáhnout GPX trasu</a>
<div id="map-links">
  <a class="map-link-btn" href="https://lighterpack.com/r/77hp5o" target="_blank" rel="noopener" aria-label="Gearlist – seznam vybavení">🎒 Gearlist</a>
  <a class="map-link-btn" href="https://docs.google.com/spreadsheets/d/1hemJfNkNlABpqTwtqYmIUWCRfa6RWAKIU8NcrT4Thj4/edit?usp=sharing" target="_blank" rel="noopener" aria-label="Rozpis trasy – kilometry, místa, občerstvení">📋 Rozpis trasy</a>
</div>

<section id="visitor-message-card" aria-label="Poslat zprávu běžci">
  <div id="visitor-message-title">Napiš mi vzkaz</div>
  <form id="visitor-message-form">
    <label class="visitor-field">
      <span>Jméno</span>
      <input id="visitor-name" name="senderName" type="text" maxlength="40" autocomplete="name" placeholder="Tvoje jméno" required />
    </label>
    <label class="visitor-field">
      <span>Zpráva</span>
      <textarea id="visitor-text" name="messageText" rows="3" maxlength="500" placeholder="Držím palce, běžíš skvěle!" required></textarea>
    </label>
    <div class="visitor-honeypot" aria-hidden="true">
      <label for="visitor-website">Web</label>
      <input id="visitor-website" name="website" type="text" tabindex="-1" autocomplete="off" />
    </div>
    <button id="visitor-submit" type="submit">Odeslat zprávu</button>
    <p id="visitor-message-status" aria-live="polite"></p>
  </form>
</section>

<!-- Lightbox pro fotky -->
<div id="lightbox" role="dialog" aria-modal="true" aria-label="Fotografie v plné velikosti">
  <button id="lightbox-close" aria-label="Zavřít">×</button>
  <img id="lightbox-img" src="" alt="Fotografie v plné velikosti" />
  <div id="lightbox-caption"></div>
</div>

<!-- Panel zpráv -->
<div id="notes-panel">
  <div id="notes-header">
    <span id="notes-title">Zprávy</span>
    <span id="notes-count">0</span>
    <button id="notes-close" aria-label="Zavřít panel">×</button>
  </div>
  <div id="notes-list">
    <div id="notes-empty">Zatím žádné zprávy.<br/>Záznamy se načtou automaticky.</div>
  </div>
</div>

<!-- Plovoucí tlačítko (mobil) -->
<button id="notes-fab">
  ☰ Zprávy<span id="fab-count">0</span>
</button>

<script src="./runtime-config.js"></script>
<script src="./shared/project-config.js"></script>
<script src="./shared/note-records.js"></script>
<script src="./map/shared.js"></script>
<script src="./map/lightbox.js"></script>
<script src="./map/tokens.js"></script>
<script src="./map/utils.js"></script>
<script src="./map/audio.js"></script>
<script src="./map/panel.js"></script>
<script src="./map/messages.js"></script>
<script src="./map/data.js"></script>
</body>
</html>
